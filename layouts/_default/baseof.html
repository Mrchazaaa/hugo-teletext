<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default `en` }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <link rel="icon" type="image/x-icon" href="{{ `star.ico` | relURL }}">
  <link rel="apple-touch-icon" href="{{ `star.ico` | relURL }}">
  <link rel="preload" href="{{ `fonts/MODE7GX3.TTF` | relURL }}" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="{{ `css/teletext.css` | relURL }}">
</head>
<body{{ if site.Params.enableScanlines }} class="scanlines-enabled"{{ end }}>
  <main class="page" aria-label="{{ if .IsHome }}{{ .Title }} portfolio{{ else }}{{ .Title }}{{ end }}">
    {{ partial "topline.html" . }}
    {{ block "main" . }}{{ end }}
  </main>
  <script src="{{ `js/clock.js` | relURL }}" defer></script>
</body>
</html>
